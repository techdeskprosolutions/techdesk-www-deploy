version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: login-test-web
    ports:
      - "8082:80"                    # You can access it on port 8082 for now
    volumes:
      - ./html:/var/www/html
    networks:
      - panel_panel_net              # ← Use your actual network

networks:
  panel_panel_net:
    external: true
