version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: login-test-web
    ports:
      - "8082:80"          # ← Changed from 8080 to 8082
    volumes:
      - ./html:/var/www/html
    networks:
      - your-existing-network   # ← Important: join your current network
    # depends_on is optional if DB is already running

networks:
  your-existing-network:
    external: true          # ← Use your actual network name here
